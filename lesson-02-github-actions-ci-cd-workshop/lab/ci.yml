# =============================================================================
# GitHub Actions CI Pipeline for Node.js (pnpm)
# =============================================================================
# This workflow runs on every push to main and on pull requests.
# It performs linting, testing (with coverage), and building in parallel
# where possible, with build depending on lint+test passing first.
# =============================================================================

name: CI Pipeline

# -----------------------------------------------------------------------------
# Triggers: When does this workflow run?
# -----------------------------------------------------------------------------
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# -----------------------------------------------------------------------------
# Permissions: Principle of least privilege
# Only request the permissions your workflow actually needs.
# -----------------------------------------------------------------------------
permissions:
  contents: read        # Checkout code
  checks: write         # Report test results
  pull-requests: read   # Access PR metadata

# -----------------------------------------------------------------------------
# Concurrency: Cancel in-progress runs for the same branch/PR
# This saves runner minutes when you push multiple commits quickly.
# -----------------------------------------------------------------------------
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job: Lint
  # Runs ESLint to catch code quality and style issues early.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm must be installed BEFORE actions/setup-node so that
      # setup-node can locate the pnpm cache directory.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Caching is built into setup-node when pnpm is detected.
          # It caches the pnpm store (~/.local/share/pnpm/store).
          cache: "pnpm"

      # --frozen-lockfile ensures CI uses exact versions from pnpm-lock.yaml.
      # This prevents "works on my machine" issues from version drift.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # Job: Test
  # Runs Jest with coverage reporting and uploads the coverage artifact.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run tests with coverage. The --ci flag optimizes Jest for CI:
      # - Fails if no tests found (catches accidentally deleted test files)
      # - Disables interactive watch mode
      - name: Run tests with coverage
        run: pnpm test -- --ci --coverage

      # Upload coverage reports as an artifact so they can be:
      # 1. Downloaded for local inspection
      # 2. Used by subsequent jobs (e.g., coverage badge generation)
      # 3. Referenced in PR comments by coverage bot integrations
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          # Keep coverage reports for 14 days to save storage
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job: Build
  # Compiles/bundles the application to verify it builds successfully.
  # Only runs after lint and test pass (fail-fast).
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    # Wait for lint and test to pass before building.
    # This saves runner minutes by not building broken code.
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      # Upload the build output for potential use in deployment workflows
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7
